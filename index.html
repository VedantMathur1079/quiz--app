<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizApp — Group 13</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- ═══════════════════════════════════════
       WELCOME SCREEN
  ═══════════════════════════════════════ -->
  <div id="screen-welcome" class="screen active">
    <div class="card">
      <div class="welcome-header">
        <span class="logo-icon">⚡</span>
        <h1>QuizApp</h1>
        <p>Test your knowledge across multiple categories</p>
        <div class="tag-row">
          <span class="tag">10 Questions</span>
          <span class="tag">20s Timer</span>
          <span class="tag">5 Categories</span>
          <span class="tag">Leaderboard</span>
        </div>
      </div>

      <div class="input-group">
        <label for="player-name">Your Name</label>
        <input
          type="text"
          id="player-name"
          placeholder="Enter your name…"
          maxlength="24"
          autocomplete="off"
        />
        <div class="error-msg" id="name-error"></div>
      </div>

      <button class="btn btn-primary" id="start-btn">Start Quiz →</button>

      <div class="welcome-footer">
        <button class="btn btn-ghost" id="view-lb-btn">🏆 View Leaderboard</button>
      </div>
    </div>
  </div>


  <!-- ═══════════════════════════════════════
       QUIZ SCREEN
  ═══════════════════════════════════════ -->
  <div id="screen-quiz" class="screen">
    <div class="card">

      <!-- Header row -->
      <div class="quiz-header">
        <div class="q-meta">
          <span class="q-number" id="question-number">Question 1 / 10</span>
          <span class="q-category" id="question-category">Science</span>
        </div>
        <span id="score-display">Score: 0</span>
      </div>

      <!-- Progress -->
      <div class="progress-bar">
        <div id="progress-fill" style="width: 0%"></div>
      </div>

      <!-- Timer -->
      <div class="timer-row">
        <div class="timer-bar">
          <div id="timer-fill"></div>
        </div>
        <span id="timer-count">20</span>
      </div>

      <!-- Question -->
      <p id="question-text">Loading question…</p>

      <!-- Options -->
      <div id="options-container"></div>

      <!-- Feedback toast -->
      <div class="feedback hidden" id="feedback"></div>

      <!-- Next -->
      <button class="btn btn-primary hidden" id="next-btn">Next Question →</button>

    </div>
  </div>


  <!-- ═══════════════════════════════════════
       RESULTS SCREEN
  ═══════════════════════════════════════ -->
  <div id="screen-results" class="screen">
    <div class="card">

      <div class="results-hero">
        <span id="result-emoji">🎉</span>
        <h2>Well done, <span id="result-name">Player</span>!</h2>
        <p id="result-message">Great effort!</p>
        <div class="score-circle">
          <span class="big-score" id="result-score">0 / 10</span>
          <span class="pct" id="result-percentage">0%</span>
        </div>
      </div>

      <!-- Answer breakdown -->
      <p class="breakdown-title">Answer Breakdown</p>
      <div id="answer-breakdown"></div>

      <!-- Actions -->
      <div class="btn-row">
        <button class="btn btn-secondary" id="retry-btn">🔄 Play Again</button>
        <button class="btn btn-secondary" id="leaderboard-btn">🏆 Leaderboard</button>
      </div>

    </div>
  </div>


  <!-- ═══════════════════════════════════════
       LEADERBOARD SCREEN
  ═══════════════════════════════════════ -->
  <div id="screen-leaderboard" class="screen">
    <div class="card">

      <div class="lb-header">
        <h2>🏆 Leaderboard</h2>
        <button class="btn btn-ghost" id="back-from-lb">← Back</button>
      </div>

      <table id="leaderboard-table">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Name</th>
            <th>Score</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
      </table>

    </div>
  </div>

</div><!-- /#app -->

<!-- Scripts (order matters) -->
<script src="questions.js"></script>
<script src="script.js"></script>
</body>
</html>
